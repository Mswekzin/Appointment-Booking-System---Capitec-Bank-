spring:
  datasource:
    url: jdbc:h2:mem:apptest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false


app:
  security:
    jwt:
      secret: TestSecretKeyForJWTThatIsAtLeast256BitsLongForHMAC
      expiration-ms: 3600000
